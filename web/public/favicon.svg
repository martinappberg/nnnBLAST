<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Three motif blocks connected by dashed gaps -->
  <rect x="1" y="9" width="8" height="14" rx="3" fill="#F9A8B8"/>
  <rect x="12" y="9" width="8" height="14" rx="3" fill="#89CCD3"/>
  <rect x="23" y="9" width="8" height="14" rx="3" fill="#F4A9A0"/>
  <!-- Gap dashes -->
  <line x1="9.5" y1="16" x2="11.5" y2="16" stroke="#FECDD3" stroke-width="1.5" stroke-dasharray="1 1"/>
  <line x1="20.5" y1="16" x2="22.5" y2="16" stroke="#FECDD3" stroke-width="1.5" stroke-dasharray="1 1"/>
  <!-- n letters -->
  <text x="5" y="18.5" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">n</text>
  <text x="16" y="18.5" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">n</text>
  <text x="27" y="18.5" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">n</text>
</svg>
